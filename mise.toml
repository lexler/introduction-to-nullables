[tools]
java = "temurin-17"

[tasks.test]
description = "Run all tests"
run = "./test.sh"
run_windows = ".\\test.cmd"

[tasks.build_and_test]
description = "Clean build and run all tests"
run = "./build_and_test.sh"
run_windows = ".\\build_and_test.cmd"

[tasks.doctor]
description = "Show Java and Maven versions"
run = "java -version && ./mvnw -version"
run_windows = "java -version && .\\mvnw.cmd -version"
